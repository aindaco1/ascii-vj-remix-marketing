<div class="docs-language-switcher">
  <select id="docs-language-switcher" class="language-switcher" data-language-switcher aria-label="Language">
    {% for pair in site.data.i18n %}
      {% assign locale = pair[1] %}
      <option value="{{ pair[0] }}">{{ locale.native_name }}</option>
    {% endfor %}
  </select>
</div>
