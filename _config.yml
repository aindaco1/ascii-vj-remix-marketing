title: ASCII VJ Remix
description: ASCII VJ Remix is a desktop visualizer for DJs and VJs who want live ASCII video, camera, and audio-reactive visuals.
url: "https://aindaco1.github.io/ascii-vj-remix-marketing"
baseurl: ""
repository: aindaco1/ascii-vj-remix-marketing
logo: /assets/images/ascii-social-card.png
image: /assets/images/ascii-social-card.png
social:
  name: ASCII VJ Remix
  links:
    - https://github.com/aindaco1/ascii-vj-remix
seo:
  default_social_image_alt: ASCII VJ Remix social card with neon ASCII mountain lines and the text Simple visuals for DJs. Deep ASCII control for VJs.
  og_locale_overrides:
    en: en_US
    es: es_ES
theme: just-the-docs
permalink: pretty

include:
  - .well-known

lang: en
color_scheme: dustwave
search_enabled: true
search:
  heading_level: 3
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s/]+/

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-include-cache

sass:
  style: compressed

defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"
  - scope:
      path: "index.md"
    values:
      layout: "homepage"
      nav_enabled: false
      sitemap: true
  - scope:
      path: "docs"
      type: "pages"
    values:
      layout: "default"
      sitemap: true

exclude:
  - .sass-cache/
  - .jekyll-cache/
  - Gemfile.lock
  - scripts/
  - README-source-notes.md
